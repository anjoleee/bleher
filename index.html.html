// ── AUDIO ──────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let bgMusic = null;
let musicStarted = false;

function initAudio() {
  if(audioCtx) return;
  audioCtx = new AudioCtx();
}

// Background music loader
async function startMusic() {
  if(musicStarted) return;
  initAudio();
  try {
    const resp = await fetch("https://files.catbox.moe/7r5ief.mp3");
    const buf = await resp.arrayBuffer();
    const decoded = await audioCtx.decodeAudioData(buf);
    bgMusic = audioCtx.createBufferSource();
    bgMusic.buffer = decoded;
    bgMusic.loop = true;
    const gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.45;
    bgMusic.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    bgMusic.start(0);
    musicStarted = true;
  } catch(e) { console.log("Music load failed:", e); }
}

// Sound effects using Web Audio API synthesis
function playSound(type) {
  initAudio();
  if(!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  if(type === "jump") {
    osc.type = "square";
    osc.frequency.setValueAtTime(300, now);
    osc.frequency.exponentialRampToValueAtTime(600, now + 0.12);
    gain.gain.setValueAtTime(0.18, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
    osc.start(now); osc.stop(now + 0.18);
  } else if(type === "collect") {
    osc.type = "sine";
    osc.frequency.setValueAtTime(600, now);
    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.06);
    osc.frequency.exponentialRampToValueAtTime(900, now + 0.12);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    osc.start(now); osc.stop(now + 0.15);
  } else if(type === "stomp") {
    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(200, now);
    osc.frequency.exponentialRampToValueAtTime(50, now + 0.15);
    gain.gain.setValueAtTime(0.25, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
    osc.start(now); osc.stop(now + 0.18);
  } else if(type === "die") {
    osc.type = "square";
    osc.frequency.setValueAtTime(440, now);
    osc.frequency.exponentialRampToValueAtTime(110, now + 0.4);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
    osc.start(now); osc.stop(now + 0.45);
  } else if(type === "win") {
    // cute little fanfare
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = "sine";
      o.frequency.value = freq;
      g.gain.setValueAtTime(0, now + i*0.12);
      g.gain.linearRampToValueAtTime(0.2, now + i*0.12 + 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, now + i*0.12 + 0.2);
      o.start(now + i*0.12); o.stop(now + i*0.12 + 0.2);
    });
  } else if(type === "land") {
    osc.type = "sine";
    osc.frequency.setValueAtTime(150, now);
    osc.frequency.exponentialRampToValueAtTime(80, now + 0.08);
    gain.gain.setValueAtTime(0.12, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    osc.start(now); osc.stop(now + 0.1);
  }
}

function fr(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),w,h);}
function overlap(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}

function drawBrick(p){

  for(let y=p.y;y<p.y+p.h;y+=8)ctx.fillRect(p.x,y,p.w,1);
  for(let r=0;r<p.h/8;r++){const off=r%2===0?0:8;for(let x=p.x+off;x<p.x+p.w;x+=16)ctx.fillRect(x,p.y+r*8,1,8);}
}

  fr(ox+38,oy+26,5,5,g);

  // ── body (chubby) ──
  fr(ox+7,oy+26,26,22,g);
  fr(ox+10,oy+28,20,18,l); // belly

  // ── arms (stubby cute) ──
  fr(ox+1,oy+26+bob,8,12,g);   fr(ox+1,oy+26+bob,6,8,l);
  fr(ox+31,oy+26+(bob?0:1),8,12,g); fr(ox+32,oy+26+(bob?0:1),5,8,l);

  fr(ox+7,oy+2,26,26,l);  // face
  fr(ox+9,oy+3,22,22,l);  // extra round

  fr(ox+32,oy+5,7,10,g);  fr(ox+33,oy+6,5,8,l);

  // pupils (big dark)

  // shine dots (2 per eye = sparkle)

  fr(ox+11,oy+15,2,2,'#FFFFFF');  fr(ox+23,oy+15,2,2,'#FFFFFF');

  // ── little forehead tuft ──
  fr(ox+15,oy+0,10,4,d);

}

function drawSealTaunts(){
  enemies.forEach(e=>{
    if(!e.alive||!e.taunt||!e.tauntVisible)return;
    const sx=e.x-camera.x+e.w/2;
    const sy=e.y-14;
    const lines=e.taunt.split("\n");
    const maxW=lines.reduce((m,l)=>{ctx.font="bold 11px \"Comic Sans MS\"";return Math.max(m,ctx.measureText(l).width);},0);
    const bw=maxW+20, bh=lines.length*16+14;
    const bx=sx-bw/2, by=sy-bh;
    // Glitter shimmer
    const shimmer=Math.sin(e.tauntT*0.25)*0.3+0.7;
    // Box shadow/glow
    ctx.shadowColor="#FF69B4";ctx.shadowBlur=12*shimmer;
    // Gradient pink sparkle box
    ctx.fillStyle="#FFD6F5";
    // Rounded rect
    const r2=8;
    ctx.beginPath();ctx.moveTo(bx+r2,by);ctx.lineTo(bx+bw-r2,by);
    ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+r2);
    ctx.lineTo(bx+bw,by+bh-r2);ctx.quadraticCurveTo(bx+bw,by+bh,bx+bw-r2,by+bh);
    ctx.lineTo(bx+r2,by+bh);ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-r2);
    ctx.lineTo(bx,by+r2);ctx.quadraticCurveTo(bx,by,bx+r2,by);
    ctx.closePath();ctx.fill();
    // Glitter border
    ctx.strokeStyle=`hsl(${(e.tauntT*5)%360},100%,70%)`;
    ctx.lineWidth=2.5;ctx.stroke();
    ctx.shadowBlur=0;
    // Sparkle dots
    for(let sp=0;sp<6;sp++){
      const spx=bx+(sp*bw/5)%bw,spy=by+Math.sin(e.tauntT*0.3+sp)*4;
      ctx.fillStyle=`hsl(${(sp*60+e.tauntT*8)%360},100%,75%)`;
      ctx.beginPath();ctx.arc(spx,spy,2,0,Math.PI*2);ctx.fill();
    }
    // Speech tail
    ctx.fillStyle="#FFD6F5";
    ctx.beginPath();ctx.moveTo(sx-6,by+bh);ctx.lineTo(sx,by+bh+10);ctx.lineTo(sx+6,by+bh);ctx.closePath();ctx.fill();
    ctx.strokeStyle=`hsl(${(e.tauntT*5)%360},100%,70%)`;ctx.lineWidth=2;ctx.stroke();
    // Text
    ctx.fillStyle="#CC0066";
    ctx.font=`bold 11px "Comic Sans MS"`;
    ctx.textAlign="center";
    lines.forEach((line,li)=>{
      ctx.fillText(line,sx,by+14+li*16);
    });
    ctx.textAlign="left";
  });
}

function drawPlayer(){
  if(player.invincible>0&&Math.floor(player.invincible/3)%2===0)return;
  ctx.save();
  const cx=player.x+player.w/2, cy=player.y+player.h/2+player.bobY;
  ctx.translate(cx,cy);
  if(player.facing>0)ctx.scale(-1,1);
  if(player.dead)ctx.rotate(Math.PI);
  // Squash/stretch
  if(!player.dead&&!player.onGround){
    if(player.vy<-2){ctx.scale(0.82,1.2);}
    else if(player.vy>2){ctx.scale(1.15,0.85);}
  }
  const iw=player.w*1.7, ih=player.h*1.7;
  if(monkeyImg.complete&&monkeyImg.naturalWidth>0){
    ctx.drawImage(monkeyImg,-iw/2,-ih/2,iw,ih);
  } else {
    ctx.translate(-player.w/2,-player.h/2);
    drawMonkeyFallback(0,0,player.frame);
  }
  ctx.restore();
}

function drawButterfly(b){
  const flap=Math.sin(b.t*8)*4;
  ctx.save();ctx.translate(b.x,b.y);
  fr(-9,-5+flap,8,9,C.bf1);fr(1,-5-flap,8,9,C.bf1);
  fr(-7,-3+flap,5,6,C.bfWing);fr(2,-3-flap,5,6,C.bfWing);
  fr(-5,1+flap,2,2,"#FF1493");fr(3,1-flap,2,2,"#FF1493");
  fr(-1,-6,2,12,"#222");
  fr(-2,-9,1,4,"#555");fr(1,-9,1,4,"#555");
  fr(-3,-10,2,2,C.bf1);fr(1,-10,2,2,C.bf1);
  ctx.restore();
}

function drawEnemy(e){
  if(!e.alive) return;
  ctx.save();
  ctx.translate(e.x + e.w/2, e.y + e.h/2);
  if(e.facing > 0) ctx.scale(-1,1);

  if(e.stomped){
    // squished flat
    ctx.scale(1.4, 0.35);
    if(sealImg.complete && sealImg.naturalWidth>0){
      ctx.drawImage(sealImg, -e.w/2, -e.h/2, e.w, e.h);
    }
  } else {
    // gentle bob
    const bob = Math.sin(e.t * 0.12) * 2;
    ctx.translate(0, bob);

    if(sealImg.complete && sealImg.naturalWidth>0){
      ctx.drawImage(sealImg, -e.w/2, -e.h/2, e.w, e.h);
    } else {
      // fallback pixel seal
      fr(-e.w/2,-e.h/2,e.w,e.h,"#C9E8F0");
    }

    // ── GLITTER particles around the seal ──
    const glitterColors = ["#FF69B4","#FFD700","#FF1493","#AAFFEE","#FFB7D5","#FFFFFF","#FF85C1"];
    for(let g=0; g<6; g++){
      const angle = (e.t * 0.08 + g * (Math.PI*2/6));
      const radius = 18 + Math.sin(e.t*0.15 + g)*5;
      const gx = Math.cos(angle)*radius;
      const gy = Math.sin(angle)*radius;
      const size = 2 + Math.sin(e.t*0.2+g*1.3)*1.5;
      ctx.fillStyle = glitterColors[g % glitterColors.length];
      ctx.globalAlpha = 0.6 + Math.sin(e.t*0.3+g)*0.4;
      // star shape
      ctx.beginPath();
      for(let s=0;s<4;s++){
        const sa = s*(Math.PI/2) + e.t*0.05;
        ctx.lineTo(gx + Math.cos(sa)*size, gy + Math.sin(sa)*size);
        ctx.lineTo(gx + Math.cos(sa+Math.PI/4)*size*0.4, gy + Math.sin(sa+Math.PI/4)*size*0.4);
      }
      ctx.closePath(); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // tiny sparkle flashes
    for(let s=0;s<3;s++){
      const st = (e.t*0.07 + s*2.1) % (Math.PI*2);
      if(st < 0.5){
        const sx2 = (s-1)*12;
        const sy2 = -e.h/2 - 5 - s*4;
        const alpha = 1 - st/0.5;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = "#FFFFFF";
        ctx.fillRect(sx2-1, sy2-3, 2, 6);
        ctx.fillRect(sx2-3, sy2-1, 6, 2);
        ctx.globalAlpha = 1;
      }
    }
  }
  ctx.restore();
}

function drawBananaPrincess(bx,by,bt,kiss){
  ctx.save();
  ctx.translate(bx, by + Math.sin(bt*3)*2);
  const iw=48, ih=72;
  if(princessImg.complete && princessImg.naturalWidth>0){
    ctx.drawImage(princessImg, -8, -16, iw, ih);
  } else {
    // fallback pixel princess
    const ys=C.bananaSkin, yb=C.bananaBody, yd=C.bananaDk;
    const pk='#FFB7D5', dpk='#FF69B4', wh='#FFFFFF';
    fr(2,40,28,20,pk); fr(0,44,32,18,dpk); fr(2,44,28,16,pk);
    for(let i=0;i<4;i++) fr(i*8,58,7,6,dpk);
    fr(7,22,18,22,ys); fr(9,24,14,18,yb);
    fr(6,22,20,12,dpk); fr(8,23,16,10,pk);
    fr(5,2,22,22,yb); fr(7,3,18,20,ys);
    fr(9,8,10,11,wh); fr(10,9,8,9,'#1a0a0a'); fr(17,9,3,3,wh);
    fr(19,8,10,11,wh); fr(20,9,8,9,'#1a0a0a'); fr(24,9,3,3,wh);
    if(kiss){fr(12,21,8,4,dpk);}else{fr(12,21,4,2,'#A0522D');fr(14,22,4,2,'#A0522D');}
    fr(7,18,5,4,pk); fr(20,18,5,4,pk);
  }
  ctx.restore();
}

function drawCastle(){}

function drawFlagPole(){
  if(!flagPole)return;
  const fx=flagPole.x-camera.x;
  fr(fx,flagPole.y,4,flagPole.h,"#888");fr(fx-2,flagPole.y-8,8,8,"#FFCC00");
  fr(fx+4,flagPole.y,24,16,"#FF3333");fr(fx+4,flagPole.y,24,8,"#FF6666");
}

function drawParticles(){
  particles=particles.filter(p=>p.l>0);
  particles.forEach(p=>{
    ctx.globalAlpha=p.l/p.ml;fr(p.x-camera.x,p.y,p.s,p.s,p.c);ctx.globalAlpha=1;
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.l--;
  });
}
function spawnParticles(wx,wy,c,n){
  for(let i=0;i<n;i++)particles.push({x:wx,y:wy,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4-2,c,s:4+Math.random()*4,l:40,ml:40});
}

function drawHearts(){
  hearts=hearts.filter(h=>h.l>0);
  hearts.forEach(h=>{
    ctx.save();ctx.globalAlpha=h.l/h.ml;
    const hx=h.x-camera.x,hy=h.y,s=h.s;
    fr(hx-s/2,hy,s*2,s*2,"#FF3399");fr(hx-s*1.5,hy-s,s*1.5,s*2,"#FF3399");
    fr(hx,hy-s,s*1.5,s*2,"#FF3399");fr(hx-s/2,hy-s*1.5,s,s,"#FF3399");fr(hx+s/2,hy-s*1.5,s,s,"#FF3399");
    ctx.restore();h.x+=h.vx;h.y+=h.vy;h.vy-=0.04;h.l--;
  });
}
function spawnHeart(wx,wy){hearts.push({x:wx,y:wy,vx:(Math.random()-0.5)*2,vy:-2-Math.random()*2,s:5,l:70,ml:70});}

//  PHYSICS 
const GRAVITY=0.45,JUMP=-11,SPD=3.5,MAXFALL=12;

function updatePlayer(){
  if(player.dead){player.vy+=GRAVITY;player.y+=player.vy;return;}
  const L=keys["ArrowLeft"]||keys["a"]||keys["A"];
  const R=keys["ArrowRight"]||keys["d"]||keys["D"];
  const J=keys[" "]||keys["z"]||keys["Z"]||keys["w"]||keys["W"]||keys["ArrowUp"];
  if(L){player.vx-=0.5;if(player.vx<-SPD)player.vx=-SPD;player.facing=-1;}
  else if(R){player.vx+=0.5;if(player.vx>SPD)player.vx=SPD;player.facing=1;}
  else player.vx*=0.75;
  if(J&&player.onGround){player.vy=JUMP;player.onGround=false;playSound("jump");}
  player.vy+=GRAVITY;if(player.vy>MAXFALL)player.vy=MAXFALL;
  player.x+=player.vx;player.y+=player.vy;
  if(player.x<0)player.x=0;
  player.onGround=false;
  for(const p of platforms){
    if(overlap(player.x,player.y,player.w,player.h,p.x,p.y,p.w,p.h)){
      const ox=player.x+player.w/2-(p.x+p.w/2),oy=player.y+player.h/2-(p.y+p.h/2);
      const hw=player.w/2+p.w/2,hh=player.h/2+p.h/2,dx=hw-Math.abs(ox),dy=hh-Math.abs(oy);
      if(dx<dy)player.x+=ox>0?dx:-dx;
      else{if(oy>0){player.y+=dy;player.vy=0;}else{player.y-=dy;if(player.vy>0){player.vy=0;if(!player.onGround)playSound("land");player.onGround=true;}}}
    }
  }
  if(player.y>520)killPlayer();
  camera.x=Math.max(0,player.x-200);
  player.animTimer++;
  if(player.onGround&&Math.abs(player.vx)>0.5){if(player.animTimer%8===0)player.frame=1-player.frame;player.bobY=Math.sin(player.animTimer*0.4)*3;}
  else{player.bobY=0;player.frame=0;}
  if(player.invincible>0)player.invincible--;
}

function killPlayer(){
  if(player.invincible>0||player.dead)return;
  player.dead=true;player.vy=-9;lives--;updateUI();playSound("die");
  setTimeout(()=>{
    if(lives<=0)state="gameover";
    else{resetPlayer();buildLevel();butterflies=0;score=Math.max(0,score-200);updateUI();player.dead=false;}
  },1600);
}

function updateEnemies(){
  enemies.forEach(e=>{
    if(!e.alive)return;
    if(e.stomped){e.st++;if(e.st>30)e.alive=false;return;}
    e.x+=e.vx;e.t++;if(e.t%16===0)e.frame=1-e.frame;
    // taunt visibility
    if(e.taunt){
      const dx=player.x-(e.x+e.w/2),dy=player.y-(e.y+e.h/2);
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<180&&!e.stomped){e.tauntVisible=true;e.tauntT++;}
      else{e.tauntVisible=false;e.tauntT=0;}
    }
    for(const p of platforms){
      if(overlap(e.x,e.y,e.w,e.h+4,p.x,p.y,p.w,p.h)){
        const ox=e.x+e.w/2-(p.x+p.w/2);
        if(Math.abs(ox)>e.w/2+p.w/2-4){e.vx*=-1;e.facing*=-1;}else e.y=p.y-e.h;
      }
    }
    if(e.x<0||e.x>LW*TILE-e.w){e.vx*=-1;e.facing*=-1;}
    if(player.dead||player.invincible>0)return;
    if(overlap(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){
      if(player.vy>0&&player.y+player.h<e.y+e.h*0.55){
        e.stomped=true;e.st=0;player.vy=-7;score+=200;playSound("stomp");
        spawnParticles(e.x+14,e.y,C.star,12);updateUI();
      } else killPlayer();
    }
  });
}

function updateButterflies(){
  bflies.forEach(b=>{
    if(!b.alive)return;
    b.t+=0.05;
    if(overlap(player.x,player.y,player.w,player.h,b.x-8,b.y-8,16,16)){
      b.alive=false;butterflies++;score+=100;spawnParticles(b.x,b.y,C.bf1,8);updateUI();playSound("collect");
    }
  });
}

function updateEnding(){
  endTimer++;
  if(banana){
    const tx=banana.x-52;
    if(player.x<tx-2)player.x+=2.5;else if(player.x>tx+2)player.x-=2.5;
    player.onGround=true;player.vy=0;
    camera.x+=(banana.x-300-camera.x)*0.04;
    banana.t+=0.05;
  }
  if(endTimer>90){
    kissProgress=Math.min(1,(endTimer-90)/60);
    if(endTimer%6===0&&kissProgress>0&&banana)spawnHeart((banana.x+player.x)/2,player.y-20);
  }
  if(endTimer>260){state="win";playSound("win");}
}

function updateUI(){
  document.getElementById("scoreDisplay").textContent="score: "+score;
  document.getElementById("livesDisplay").textContent="lives: "+lives;
  document.getElementById("bfDisplay").textContent="butterflies: "+butterflies;
}

//  SCREENS 
function drawTitle(){
  ctx.fillStyle="#FFD6E7";ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<80;i++){ctx.fillStyle=`hsl(${(i*37)%360},70%,85%)`;const x=(i*137)%canvas.width,y=(i*97)%canvas.height;ctx.fillRect(x,y,i%3===0?3:2,i%3===0?3:2);}
  ctx.fillStyle="#FF69B4";ctx.font="bold 44px \"Comic Sans MS\"";ctx.textAlign="center";
  ctx.shadowColor="#FF69B4";ctx.shadowBlur=20;ctx.fillText("oo oo ah ah monke",canvas.width/2,105);ctx.shadowBlur=0;
  ctx.fillStyle="#FF85C1";ctx.font="18px \"Comic Sans MS\"";ctx.fillText("save the banana princess!",canvas.width/2,148);

  // Monkey sprite on title
  const bounce=Math.sin(Date.now()/400)*8;
  if(monkeyImg.complete&&monkeyImg.naturalWidth>0){
    ctx.save();ctx.translate(canvas.width/2-110,175+bounce);
    ctx.drawImage(monkeyImg,0,0,110,110);ctx.restore();
  }
  // draw arrows and pixel heart between monkey and princess
  const hcx=canvas.width/2, hcy=232;
  // left arrow
  ctx.fillStyle="#FF69B4";
  ctx.beginPath();ctx.moveTo(hcx-40,hcy);ctx.lineTo(hcx-22,hcy-10);ctx.lineTo(hcx-22,hcy+10);ctx.closePath();ctx.fill();
  // right arrow
  ctx.beginPath();ctx.moveTo(hcx+40,hcy);ctx.lineTo(hcx+22,hcy-10);ctx.lineTo(hcx+22,hcy+10);ctx.closePath();ctx.fill();
  // pixel heart
  const hp=4, hx=hcx-10, hy=hcy-10;
  ctx.fillStyle="#FF1493";
  [[1,0],[2,0],[4,0],[5,0],[0,1],[1,1],[2,1],[3,1],[4,1],[5,1],[6,1],
   [0,2],[1,2],[2,2],[3,2],[4,2],[5,2],[6,2],
   [1,3],[2,3],[3,3],[4,3],[5,3],[2,4],[3,4],[4,4],[3,5]
  ].forEach(([px,py])=>ctx.fillRect(hx+px*hp, hy+py*hp, hp, hp));
  ctx.fillStyle="#FF69B4";
  [[2,1],[5,1]].forEach(([px,py])=>ctx.fillRect(hx+px*hp, hy+py*hp, hp-1, hp-1));

  // Banana princess
  ctx.save();ctx.translate(canvas.width/2+55,178);drawBananaPrincess(0,0,Date.now()/1000,false);ctx.restore();

  if(Math.floor(Date.now()/600)%2===0){ctx.fillStyle="#FF1493";ctx.font="18px \"Comic Sans MS\"";ctx.fillText("press enter to start",canvas.width/2,390);}
  ctx.fillStyle="#FF69B4";ctx.font="14px \"Comic Sans MS\"";ctx.fillText("← → move  |  z / space jump",canvas.width/2,425);
  ctx.fillStyle="#FF85B3";ctx.font="11px \"Comic Sans MS\"";ctx.fillText("made by ur goat xX_anjothebestmeow_Xx",canvas.width/2,476);
  ctx.fillStyle="#FF9EC5";ctx.font="12px \"Comic Sans MS\"";ctx.fillText("collect  butterflies · stomp enemies · kiss the banana princess",canvas.width/2,458);
}

function drawWin(){
  ctx.fillStyle="#FFE8F5"; ctx.fillRect(0,0,canvas.width,canvas.height);
  // pastel confetti
  const t=Date.now()/400;
  for(let i=0;i<24;i++){ctx.fillStyle=`hsl(${(i*15+t*40)%360},80%,80%)`;ctx.fillRect((i*47+t*15)%canvas.width,((i*79+t*25)%canvas.height),8,8);}

  ctx.fillStyle="#FF1493"; ctx.font="bold 42px \"Comic Sans MS\""; ctx.textAlign="center";
  ctx.shadowColor="#FF69B4"; ctx.shadowBlur=20;
  ctx.fillText("you win!", canvas.width/2, 70);
  ctx.shadowBlur=0;

  ctx.fillStyle="#FF85C1"; ctx.font="18px \"Comic Sans MS\"";
  ctx.fillText("the monkey saved the banana princess!", canvas.width/2, 105);

  // big win image centered
  if(winImg.complete && winImg.naturalWidth>0){
    const bop=Math.sin(t*2)*6;
    const iw=300, ih=300;
    ctx.save();
    ctx.drawImage(winImg, canvas.width/2-iw/2, 120+bop, iw, ih);
    ctx.restore();
  }

  ctx.fillStyle="#FF69B4"; ctx.font="bold 22px \"Comic Sans MS\"";
  ctx.fillText("** kiss! **", canvas.width/2, 440);

  for(let i=0;i<14;i++){
    const hx=80+Math.sin(t+i*0.8)*50+i*44, hy=130+Math.cos(t*1.3+i)*25;
    ctx.fillStyle=`hsl(${340+i*4},100%,${55+i*2}%)`;
    ctx.font="22px serif"; ctx.fillText("<3",hx,hy);
  }

  ctx.fillStyle="#FF1493"; ctx.font="bold 16px \"Comic Sans MS\"";
  ctx.fillText(`score: ${score}   butterflies: ${butterflies}`, canvas.width/2, 462);
  if(Math.floor(Date.now()/600)%2===0){
    ctx.fillStyle="#FF1493"; ctx.font="15px \"Comic Sans MS\"";
    ctx.fillText("press enter to play again", canvas.width/2, 450);
  }
}

function drawGameOver(){
  ctx.fillStyle="rgba(255,182,193,0.92)";ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#FF1493";ctx.font="bold 52px \"Comic Sans MS\"";ctx.textAlign="center";ctx.fillText("game over",canvas.width/2,200);
  ctx.fillStyle="#FF69B4";ctx.font="20px \"Comic Sans MS\"";ctx.fillText("score: "+score,canvas.width/2,270);ctx.fillText("butterflies: "+butterflies+" ",canvas.width/2,310);
  if(Math.floor(Date.now()/600)%2===0){ctx.fillStyle="#FF1493";ctx.font="18px \"Comic Sans MS\"";ctx.fillText("press enter to retry",canvas.width/2,390);}
}

//  MAIN LOOP 
function gameLoop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(state==="title"){drawTitle();}
  else if(state==="gameover"){drawGameOver();}
  else if(state==="win"){drawWin();}
  else{
    drawBackground();
    ctx.save();ctx.translate(-camera.x,0);
    platforms.forEach(p=>{if(p.x-camera.x>-100&&p.x-camera.x<canvas.width+100){if(p.type==="ground")drawGround(p);else if(p.type==="brick")drawBrick(p);else if(p.type==="pipe")drawPipe(p);}});
    drawCastle();drawFlagPole();
    bflies.forEach(b=>{if(b.alive)drawButterfly(b);});
    enemies.forEach(e=>drawEnemy(e));
    if(banana)drawBananaPrincess(banana.x,banana.y,banana.t,kissProgress>0.5);
    drawPlayer();
    ctx.restore();
    drawParticles();drawHearts();drawSealTaunts();

    if(state==="playing"){
      updatePlayer();updateEnemies();updateButterflies();
      if(flagPole&&player.x+player.w>flagPole.x&&player.x<flagPole.x+8){state="ending";endTimer=0;kissProgress=0;}
      if(banana&&overlap(player.x,player.y,player.w,player.h,banana.x,banana.y,banana.w,banana.h)){state="ending";endTimer=0;kissProgress=0;}
    } else if(state==="ending"){
      updatePlayer();updateEnding();
    }
    // HUD
    ctx.fillStyle="rgba(255,182,193,0.7)";ctx.fillRect(0,0,canvas.width,30);
    ctx.fillStyle="#FF69B4";ctx.font="14px \"Comic Sans MS\"";ctx.textAlign="left";ctx.fillText("score: "+score+"  BUTTERFLIES: "+butterflies+"  LIVES: "+lives,10,20);
    const pct=Math.min(1,player.x/(LW*TILE));
    ctx.fillStyle="#333";ctx.fillRect(canvas.width-210,8,200,14);ctx.fillStyle="#FF69B4";ctx.fillRect(canvas.width-210,8,200*pct,14);
    ctx.fillStyle="#CC0066";ctx.font="10px Comic Sans MS";ctx.textAlign="right";ctx.fillText("goal",canvas.width-5,20);
    ctx.fillStyle="#FFB3C6";ctx.font="9px Comic Sans MS";ctx.textAlign="right";ctx.fillText("made by xX_anjothebestmeow_Xx",canvas.width-5,475);
  }
  requestAnimationFrame(gameLoop);
}

document.addEventListener("keydown",e=>{
  keys[e.key]=true;
  if(e.key==="Enter"){startMusic();if(state==="title"||state==="gameover"||state==="win"){score=0;lives=3;butterflies=0;buildLevel();resetPlayer();state="playing";updateUI();}}
  if([" ","ArrowUp","ArrowDown","ArrowLeft","ArrowRight","w","W"].includes(e.key))e.preventDefault();
});
document.addEventListener("keyup",e=>{keys[e.key]=false;});

buildLevel();
requestAnimationFrame(gameLoop);
</script>
